<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="공부시간 기록" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <title>공부시간 기록</title>
  <style>
    :root {
      --bg:#f6f7fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
      --primary:#2563eb; --primary-soft:#dbeafe; --danger:#dc2626; --shadow:0 10px 24px rgba(15,23,42,.08); --radius:18px;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif; background:var(--bg); color:var(--text); }
    .app { max-width:820px; margin:0 auto; padding:max(18px,env(safe-area-inset-top)) 16px max(28px,env(safe-area-inset-bottom)); }
    .hero { background:linear-gradient(135deg,#1d4ed8,#3b82f6); color:#fff; border-radius:24px; padding:22px 18px; box-shadow:var(--shadow); margin-bottom:16px; }
    .hero h1 { margin:0; font-size:1.6rem; font-weight:800; }

    .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:14px 0 18px; }
    .summary-card,.card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid rgba(229,231,235,.9); }
    .summary-card { padding:14px; }
    .summary-card .label { color:var(--muted); font-size:.82rem; margin-bottom:6px; }
    .summary-card .value { font-size:1.18rem; font-weight:800; line-height:1.2; }
    .summary-card .sub { margin-top:6px; font-size:.78rem; color:var(--muted); }

    .tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
    .tab-btn { border:none; background:#e5e7eb; color:#374151; padding:12px 10px; border-radius:14px; font-size:.95rem; font-weight:700; cursor:pointer; }
    .tab-btn.active { background:var(--primary); color:#fff; }
    .panel { display:none; }
    .panel.active { display:block; }

    .card { padding:16px; margin-bottom:14px; }
    .card h2 { font-size:1.08rem; margin:0 0 14px; }

    .form-grid { display:grid; gap:12px; }
    label { display:block; font-size:.9rem; font-weight:700; margin-bottom:6px; }
    input, textarea {
      width:100%; max-width:100%; min-width:0; display:block;
      border:1px solid var(--line); border-radius:14px; padding:12px 13px; font-size:1rem;
      background:#fff; color:var(--text); appearance:none; -webkit-appearance:none;
    }
    input[type="date"] { line-height:1.2; min-height:48px; }
    textarea { resize:vertical; min-height:84px; }

    .row-2 { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:10px; align-items:end; }
    .btn-row,.quick-row { display:flex; gap:10px; flex-wrap:wrap; }
    button.action,button.secondary,button.danger,.quick-btn {
      border:none; border-radius:14px; padding:12px 16px; font-size:.95rem; font-weight:800; cursor:pointer;
    }
    button.action { background:var(--primary); color:#fff; flex:1; }
    button.secondary,.quick-btn { background:#eef2ff; color:#3730a3; }
    button.danger { background:#fee2e2; color:var(--danger); }

    .subject-grid { display:grid; gap:10px; }
    .subject-row {
      display:grid; grid-template-columns:110px 1fr 100px; gap:10px; align-items:center;
      border:1px solid var(--line); border-radius:16px; padding:12px;
    }
    .subject-name { font-weight:800; }
    .subject-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .mini-btn {
      border:none; border-radius:10px; padding:8px 10px; background:#eef2ff; color:#3730a3;
      font-size:.82rem; font-weight:800; cursor:pointer;
    }
    .subject-input-wrap { display:flex; align-items:center; gap:8px; }
    .subject-input-wrap input { text-align:right; }
    .unit { color:var(--muted); font-size:.9rem; font-weight:700; white-space:nowrap; }
    .total-box {
      background:#eff6ff; border:1px solid #bfdbfe; border-radius:16px; padding:14px;
      display:flex; justify-content:space-between; align-items:center; gap:10px;
    }
    .total-box .label { font-size:.92rem; color:#1e3a8a; font-weight:700; }
    .total-box .value { font-size:1.3rem; color:#1d4ed8; font-weight:900; white-space:nowrap; }

    .backup-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .file-input { display:none; }

    .records { display:grid; gap:10px; margin-top:8px; }
    .record-item { border:1px solid var(--line); border-radius:16px; padding:14px; display:grid; gap:8px; }
    .record-top { display:flex; justify-content:space-between; gap:12px; align-items:center; }
    .record-date { font-weight:800; }
    .record-hours { font-size:1.1rem; font-weight:800; color:var(--primary); white-space:nowrap; }
    .record-note { color:var(--muted); line-height:1.45; white-space:pre-wrap; font-size:.92rem; }
    .subject-badges { display:flex; gap:6px; flex-wrap:wrap; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; font-size:.74rem; font-weight:800; width:fit-content; }
    .badge.subject { background:#e5e7eb; color:#374151; }

    .calendar-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; gap:8px; }
    .calendar-title { font-size:1.05rem; font-weight:800; text-align:center; flex:1; }
    .calendar-grid,.weekdays { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
    .weekday { text-align:center; font-size:.82rem; color:var(--muted); padding:6px 0; font-weight:700; }
    .day {
      min-height:92px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:8px;
      position:relative; cursor:pointer; display:flex; flex-direction:column; gap:4px;
    }
    .day.empty { background:transparent; border-style:dashed; cursor:default; }
    .day.today { outline:2px solid var(--primary); outline-offset:-2px; }
    .day.selected { box-shadow:inset 0 0 0 2px rgba(37,99,235,.18); }
    .day-num { font-size:.88rem; font-weight:800; }
    .mini-text { font-size:.74rem; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .heat-0{background:#fff}.heat-1{background:#eff6ff}.heat-2{background:#dbeafe}.heat-3{background:#bfdbfe}.heat-4{background:#93c5fd}.heat-5{background:#60a5fa;color:#0f172a}.heat-6{background:#3b82f6;color:#fff}
    .legend { display:flex; align-items:center; gap:8px; margin-top:12px; color:var(--muted); font-size:.82rem; flex-wrap:wrap; }
    .legend-scale { display:flex; gap:4px; }
    .legend-box { width:16px; height:16px; border-radius:5px; border:1px solid rgba(0,0,0,.04); }

    .chart-wrap { margin-top:8px; }
    canvas { width:100%; background:#fff; border-radius:14px; }
    .hint { font-size:.84rem; color:var(--muted); line-height:1.45; margin-top:8px; }
    .empty-state { text-align:center; color:var(--muted); padding:18px 10px; border:1px dashed var(--line); border-radius:16px; }

    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .stats-list { display:grid; gap:10px; }
    .stats-row {
      display:grid; grid-template-columns:90px 1fr 62px; gap:10px; align-items:center;
    }
    .stats-name { font-size:.9rem; font-weight:800; }
    .bar-bg { background:#e5e7eb; border-radius:999px; height:12px; overflow:hidden; }
    .bar-fill { background:#3b82f6; height:100%; border-radius:999px; }
    .stats-value { text-align:right; font-size:.86rem; font-weight:800; color:#1f2937; }

    @media (max-width:760px) {
      .summary-grid { grid-template-columns:repeat(2,1fr); }
      .tabs { grid-template-columns:repeat(2,1fr); }
      .stats-grid { grid-template-columns:1fr; }
    }
    @media (max-width:560px) {
      .row-2,.backup-row { grid-template-columns:1fr; }
      .subject-row { grid-template-columns:1fr; }
      .day { min-height:78px; padding:6px; }
      .mini-text { font-size:.68rem; }
      .summary-card .value { font-size:1.08rem; }
      .stats-row { grid-template-columns:78px 1fr 56px; gap:8px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero"><h1>공부시간 기록</h1></section>

    <section class="summary-grid">
      <div class="summary-card"><div class="label">오늘</div><div class="value" id="todayHours">0시간</div></div>
      <div class="summary-card"><div class="label">이번 주</div><div class="value" id="weekHours">0시간</div><div class="sub" id="weekCompare">지난주와 비교 0시간</div></div>
      <div class="summary-card"><div class="label">이번 달</div><div class="value" id="monthHours">0시간</div><div class="sub" id="monthAverage">일평균 0시간</div></div>
      <div class="summary-card"><div class="label">연속 기록</div><div class="value" id="streakDays">0일</div></div>
    </section>

    <div class="tabs">
      <button class="tab-btn active" data-tab="input">입력</button>
      <button class="tab-btn" data-tab="calendar">캘린더</button>
      <button class="tab-btn" data-tab="chart">그래프</button>
      <button class="tab-btn" data-tab="stats">통계</button>
    </div>

    <section class="panel active" id="panel-input">
      <div class="card">
        <h2>공부시간 입력</h2>
        <div class="form-grid">
          <div class="row-2">
            <div>
              <label for="studyDate">날짜</label>
              <input id="studyDate" type="date" />
            </div>
            <div>
              <label>하루 총합계</label>
              <div class="total-box">
                <div class="label">과목별 입력 합계</div>
                <div class="value" id="totalHoursDisplay">0시간</div>
              </div>
            </div>
          </div>

          <div>
            <label>과목별 입력</label>
            <div class="subject-grid">
              <div class="subject-row">
                <div class="subject-name">계약법</div>
                <div class="subject-actions">
                  <button class="mini-btn" type="button" data-subject-add="contract" data-add="0.5">+0.5</button>
                  <button class="mini-btn" type="button" data-subject-add="contract" data-add="1">+1</button>
                  <button class="mini-btn" type="button" data-subject-clear="contract">초기화</button>
                </div>
                <div class="subject-input-wrap">
                  <input id="subject-contract" type="number" min="0" max="24" step="0.5" inputmode="decimal" />
                  <span class="unit">시간</span>
                </div>
              </div>

              <div class="subject-row">
                <div class="subject-name">절차론</div>
                <div class="subject-actions">
                  <button class="mini-btn" type="button" data-subject-add="procedure" data-add="0.5">+0.5</button>
                  <button class="mini-btn" type="button" data-subject-add="procedure" data-add="1">+1</button>
                  <button class="mini-btn" type="button" data-subject-clear="procedure">초기화</button>
                </div>
                <div class="subject-input-wrap">
                  <input id="subject-procedure" type="number" min="0" max="24" step="0.5" inputmode="decimal" />
                  <span class="unit">시간</span>
                </div>
              </div>

              <div class="subject-row">
                <div class="subject-name">실무법</div>
                <div class="subject-actions">
                  <button class="mini-btn" type="button" data-subject-add="practice" data-add="0.5">+0.5</button>
                  <button class="mini-btn" type="button" data-subject-add="practice" data-add="1">+1</button>
                  <button class="mini-btn" type="button" data-subject-clear="practice">초기화</button>
                </div>
                <div class="subject-input-wrap">
                  <input id="subject-practice" type="number" min="0" max="24" step="0.5" inputmode="decimal" />
                  <span class="unit">시간</span>
                </div>
              </div>

              <div class="subject-row">
                <div class="subject-name">사무관리</div>
                <div class="subject-actions">
                  <button class="mini-btn" type="button" data-subject-add="office" data-add="0.5">+0.5</button>
                  <button class="mini-btn" type="button" data-subject-add="office" data-add="1">+1</button>
                  <button class="mini-btn" type="button" data-subject-clear="office">초기화</button>
                </div>
                <div class="subject-input-wrap">
                  <input id="subject-office" type="number" min="0" max="24" step="0.5" inputmode="decimal" />
                  <span class="unit">시간</span>
                </div>
              </div>
            </div>
          </div>

          <div>
            <label for="studyNote">메모</label>
            <textarea id="studyNote" placeholder="예: 계약법 문제풀이, 절차론 판례정리"></textarea>
          </div>

          <div class="btn-row">
            <button class="action" id="saveStudyBtn">저장</button>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>백업 / 복원</h2>
        <div class="backup-row">
          <button class="secondary" id="exportBtn">백업 내보내기</button>
          <button class="secondary" id="importBtn">백업 불러오기</button>
        </div>
        <input class="file-input" id="importFile" type="file" accept="application/json" />
      </div>

      <div class="card">
        <h2>최근 기록</h2>
        <div id="recentRecords" class="records"></div>
      </div>
    </section>

    <section class="panel" id="panel-calendar">
      <div class="card">
        <div class="calendar-head">
          <button class="secondary" id="prevMonthBtn">이전</button>
          <div class="calendar-title" id="calendarTitle"></div>
          <button class="secondary" id="nextMonthBtn">다음</button>
        </div>
        <div class="weekdays">
          <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div><div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div><div class="weekday">토</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="legend">
          <span>공부시간 적음</span>
          <div class="legend-scale">
            <span class="legend-box heat-0"></span><span class="legend-box heat-1"></span><span class="legend-box heat-2"></span><span class="legend-box heat-3"></span><span class="legend-box heat-4"></span><span class="legend-box heat-5"></span><span class="legend-box heat-6"></span>
          </div>
          <span>많음</span>
        </div>
      </div>

      <div class="card">
        <h2 id="selectedDateTitle">날짜 상세</h2>
        <div id="selectedDateDetail" class="records"></div>
      </div>
    </section>

    <section class="panel" id="panel-chart">
      <div class="card">
        <h2>최근 30일 공부시간 그래프</h2>
        <div class="chart-wrap">
          <canvas id="studyChart" width="700" height="320"></canvas>
        </div>
        <div class="hint">최근 30일을 기준으로 날짜별 총 공부시간을 표시합니다.</div>
      </div>
    </section>

    <section class="panel" id="panel-stats">
      <div class="stats-grid">
        <div class="card">
          <h2>이번 주 과목별 통계</h2>
          <div id="weeklyStats" class="stats-list"></div>
        </div>
        <div class="card">
          <h2>이번 달 과목별 통계</h2>
          <div id="monthlyStats" class="stats-list"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const STORAGE_KEY = 'study-time-tracker-v5';
    const SUBJECTS = {
      contract: '계약법',
      procedure: '절차론',
      practice: '실무법',
      office: '사무관리'
    };

    const state = {
      selectedTab: 'input',
      calendarYear: new Date().getFullYear(),
      calendarMonth: new Date().getMonth(),
      selectedDate: formatDate(new Date()),
      data: loadData()
    };

    const el = {
      todayHours: document.getElementById('todayHours'),
      weekHours: document.getElementById('weekHours'),
      weekCompare: document.getElementById('weekCompare'),
      monthHours: document.getElementById('monthHours'),
      monthAverage: document.getElementById('monthAverage'),
      streakDays: document.getElementById('streakDays'),
      studyDate: document.getElementById('studyDate'),
      studyNote: document.getElementById('studyNote'),
      totalHoursDisplay: document.getElementById('totalHoursDisplay'),
      saveStudyBtn: document.getElementById('saveStudyBtn'),
      exportBtn: document.getElementById('exportBtn'),
      importBtn: document.getElementById('importBtn'),
      importFile: document.getElementById('importFile'),
      recentRecords: document.getElementById('recentRecords'),
      calendarTitle: document.getElementById('calendarTitle'),
      calendarGrid: document.getElementById('calendarGrid'),
      prevMonthBtn: document.getElementById('prevMonthBtn'),
      nextMonthBtn: document.getElementById('nextMonthBtn'),
      selectedDateTitle: document.getElementById('selectedDateTitle'),
      selectedDateDetail: document.getElementById('selectedDateDetail'),
      studyChart: document.getElementById('studyChart'),
      weeklyStats: document.getElementById('weeklyStats'),
      monthlyStats: document.getElementById('monthlyStats'),
      subjectInputs: {
        contract: document.getElementById('subject-contract'),
        procedure: document.getElementById('subject-procedure'),
        practice: document.getElementById('subject-practice'),
        office: document.getElementById('subject-office')
      }
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    Object.entries(el.subjectInputs).forEach(([key, input]) => {
      input.addEventListener('input', updateTotalDisplay);
    });

    document.querySelectorAll('[data-subject-add]').forEach(btn => {
      btn.addEventListener('click', () => addSubjectHours(btn.dataset.subjectAdd, parseFloat(btn.dataset.add)));
    });

    document.querySelectorAll('[data-subject-clear]').forEach(btn => {
      btn.addEventListener('click', () => {
        el.subjectInputs[btn.dataset.subjectClear].value = '';
        updateTotalDisplay();
      });
    });

    el.saveStudyBtn.addEventListener('click', saveStudy);
    el.prevMonthBtn.addEventListener('click', () => changeMonth(-1));
    el.nextMonthBtn.addEventListener('click', () => changeMonth(1));
    el.exportBtn.addEventListener('click', exportData);
    el.importBtn.addEventListener('click', () => el.importFile.click());
    el.importFile.addEventListener('change', importData);

    initialize();
    registerServiceWorker();

    function initialize() {
      migrateOldData();
      const today = formatDate(new Date());
      el.studyDate.value = today;
      updateTotalDisplay();
      renderAll();
    }

    function emptySubjects() {
      return { contract: 0, procedure: 0, practice: 0, office: 0 };
    }

    function normalizeSubjects(subjects) {
      const base = emptySubjects();
      for (const key of Object.keys(base)) {
        base[key] = Number((subjects || {})[key] || 0);
        if (Number.isNaN(base[key]) || base[key] < 0 || base[key] > 24) base[key] = 0;
      }
      return base;
    }

    function computeTotal(subjects) {
      return Object.values(normalizeSubjects(subjects)).reduce((sum, n) => sum + Number(n || 0), 0);
    }

    function migrateOldData() {
      const oldKeys = ['study-time-tracker-v4', 'study-time-tracker-v3', 'study-time-tracker-v2', 'study-time-tracker-v1'];
      for (const key of oldKeys) {
        const raw = localStorage.getItem(key);
        if (!raw || Object.keys(state.data.studies || {}).length) continue;
        try {
          const parsed = JSON.parse(raw);
          if (!parsed || !parsed.studies) continue;
          const studies = {};
          for (const [date, item] of Object.entries(parsed.studies)) {
            if (!isValidDateKey(date)) continue;
            let subjects = emptySubjects();
            if (item.subjects) {
              subjects = normalizeSubjects(item.subjects);
            } else if (Array.isArray(item.tags) && item.tags.length && Number(item.hours || 0) > 0) {
              // old tag 방식은 총시간을 태그별로 나눌 수 없어서 첫 태그에만 임시 이관
              const tagMap = {
                '계약법': 'contract',
                '절차론': 'procedure',
                '실무법': 'practice',
                '사무관리': 'office'
              };
              const first = tagMap[item.tags[0]];
              if (first) subjects[first] = Number(item.hours || 0);
            }
            const totalHours = computeTotal(subjects) || Number(item.hours || 0) || 0;
            studies[date] = {
              subjects,
              totalHours,
              note: String(item.note || '')
            };
          }
          state.data = { studies };
          saveData();
          break;
        } catch {}
      }
    }

    function loadData() {
      try {
        return sanitizeData(JSON.parse(localStorage.getItem(STORAGE_KEY)) || { studies: {} });
      } catch {
        return { studies: {} };
      }
    }

    function sanitizeData(data) {
      const studies = {};
      const source = (data && data.studies) || {};
      for (const [date, item] of Object.entries(source)) {
        if (!isValidDateKey(date)) continue;
        const subjects = normalizeSubjects(item.subjects);
        const note = String((item && item.note) || '');
        const totalHours = computeTotal(subjects);
        studies[date] = { subjects, totalHours, note };
      }
      return { studies };
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function switchTab(tab) {
      state.selectedTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      document.querySelectorAll('.panel').forEach(panel => panel.classList.toggle('active', panel.id === `panel-${tab}`));
      if (tab === 'chart') drawChart();
      if (tab === 'calendar') renderCalendar();
      if (tab === 'stats') renderStats();
    }

    function setSubjectInputs(subjects) {
      const normalized = normalizeSubjects(subjects);
      for (const [key, input] of Object.entries(el.subjectInputs)) {
        input.value = normalized[key] ? trimZero(normalized[key]) : '';
      }
      updateTotalDisplay();
    }

    function getSubjectInputs() {
      const out = {};
      for (const [key, input] of Object.entries(el.subjectInputs)) {
        const value = Number(input.value || 0);
        out[key] = Number.isNaN(value) ? 0 : value;
      }
      return normalizeSubjects(out);
    }

    function updateTotalDisplay() {
      el.totalHoursDisplay.textContent = `${trimZero(computeTotal(getSubjectInputs()))}시간`;
    }

    function addSubjectHours(subjectKey, amount) {
      const input = el.subjectInputs[subjectKey];
      const current = Number(input.value || 0);
      const next = Math.min(24, current + amount);
      input.value = trimZero(next);
      updateTotalDisplay();
    }


    function saveStudy() {
      const date = el.studyDate.value;
      const subjects = getSubjectInputs();
      const totalHours = computeTotal(subjects);
      const note = el.studyNote.value.trim();

      if (!date) return alert('날짜를 선택해 주세요.');
      if (totalHours <= 0) return alert('과목별 공부시간을 1개 이상 입력해 주세요.');
      if (totalHours > 24) return alert('하루 총합계는 24시간을 넘을 수 없습니다.');

      state.data.studies[date] = { subjects, totalHours, note };
      saveData();
      state.selectedDate = date;
      renderAll();
      alert('공부시간이 저장되었습니다.');
    }


    function exportData() {
      const payload = {
        app: '공부시간 기록',
        version: 5,
        exportedAt: new Date().toISOString(),
        data: state.data
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `study-time-backup-${formatDate(new Date())}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const imported = sanitizeData(parsed.data || parsed);
        if (!Object.keys(imported.studies).length && !confirm('복원할 기록이 없거나 형식이 다릅니다. 계속할까요?')) {
          event.target.value = '';
          return;
        }
        if (!confirm('현재 기록을 백업 파일로 교체할까요?')) {
          event.target.value = '';
          return;
        }
        state.data = imported;
        saveData();
        renderAll();
        alert('복원 완료');
      } catch {
        alert('파일을 읽지 못했습니다.');
      }
      event.target.value = '';
    }

    function renderAll() {
      renderSummary();
      renderRecentRecords();
      renderCalendar();
      renderSelectedDate();
      renderStats();
      drawChart();
    }

    function renderSummary() {
      const today = formatDate(new Date());
      const todayRecord = state.data.studies[today];
      const now = new Date();

      const thisWeek = getWeekRange(now);
      const prevWeekRef = new Date(thisWeek.start);
      prevWeekRef.setDate(prevWeekRef.getDate() - 1);
      const lastWeek = getWeekRange(prevWeekRef);

      const thisWeekTotal = sumRange(thisWeek.start, thisWeek.end);
      const lastWeekTotal = sumRange(lastWeek.start, lastWeek.end);
      const weekDiff = thisWeekTotal - lastWeekTotal;

      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      const monthTotal = sumRange(monthStart, monthEnd);
      const monthAverage = now.getDate() > 0 ? (monthTotal / now.getDate()) : 0;

      el.todayHours.textContent = `${todayRecord ? trimZero(todayRecord.totalHours) : 0}시간`;
      el.weekHours.textContent = `${trimZero(thisWeekTotal)}시간`;
      el.weekCompare.textContent = `지난주와 비교 ${weekDiff >= 0 ? '+' : ''}${trimZero(weekDiff)}시간`;
      el.monthHours.textContent = `${trimZero(monthTotal)}시간`;
      el.monthAverage.textContent = `일평균 ${trimZero(monthAverage)}시간`;
      el.streakDays.textContent = `${calcStreak()}일`;
    }

    function subjectBadges(subjects) {
      const items = Object.entries(normalizeSubjects(subjects)).filter(([, value]) => value > 0);
      if (!items.length) return '';
      return `
        <div class="subject-badges">
          ${items.map(([key, value]) => `<span class="badge subject">${SUBJECTS[key]} ${trimZero(value)}h</span>`).join('')}
        </div>
      `;
    }

    function renderRecentRecords() {
      const entries = Object.entries(state.data.studies).sort((a, b) => b[0].localeCompare(a[0])).slice(0, 10);
      if (!entries.length) {
        el.recentRecords.innerHTML = '<div class="empty-state">아직 저장된 공부기록이 없습니다.</div>';
        return;
      }

      el.recentRecords.innerHTML = entries.map(([date, item]) => `
        <div class="record-item">
          <div class="record-top">
            <div class="record-date">${date}</div>
            <div class="record-hours">${trimZero(item.totalHours)}시간</div>
          </div>
          ${subjectBadges(item.subjects)}
          <div class="record-note">${escapeHtml(item.note || '메모 없음')}</div>
          <div class="btn-row">
            <button class="secondary" onclick="editStudy('${date}')">불러오기</button>
            <button class="danger" onclick="deleteStudy('${date}')">삭제</button>
          </div>
        </div>
      `).join('');
    }

    function renderCalendar() {
      const year = state.calendarYear;
      const month = state.calendarMonth;
      const firstDay = new Date(year, month, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = formatDate(new Date());

      const monthEntries = [];
      for (let d = 1; d <= daysInMonth; d++) {
        const date = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const study = state.data.studies[date];
        monthEntries.push(study ? Number(study.totalHours || 0) : 0);
      }
      const maxMonthHours = Math.max(0, ...monthEntries);

      el.calendarTitle.textContent = `${year}년 ${month + 1}월`;
      const cells = [];
      for (let i = 0; i < startWeekday; i++) cells.push('<div class="day empty"></div>');

      for (let d = 1; d <= daysInMonth; d++) {
        const date = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const study = state.data.studies[date];
        const hours = study ? Number(study.totalHours || 0) : 0;
        const classes = ['day', `heat-${getHeatLevel(hours, maxMonthHours)}`];
        if (date === today) classes.push('today');
        if (date === state.selectedDate) classes.push('selected');

        cells.push(`
          <div class="${classes.join(' ')}" onclick="selectDate('${date}')">
            <div class="day-num">${d}</div>
            ${study ? `<span class="badge">${trimZero(study.totalHours)}h</span>` : ''}
          </div>
        `);
      }
      el.calendarGrid.innerHTML = cells.join('');
    }


    function getHeatLevel(hours, maxHours) {
      if (!hours || maxHours <= 0) return 0;
      const ratio = hours / maxHours;
      if (ratio <= .2) return 1;
      if (ratio <= .35) return 2;
      if (ratio <= .5) return 3;
      if (ratio <= .7) return 4;
      if (ratio <= .85) return 5;
      return 6;
    }

    function renderSelectedDate() {
      const date = state.selectedDate;
      const study = state.data.studies[date];
      el.selectedDateTitle.textContent = `${date} 상세`;

      if (!study) {
        el.selectedDateDetail.innerHTML = '<div class="empty-state">선택한 날짜에 저장된 내용이 없습니다.</div>';
        return;
      }

      el.selectedDateDetail.innerHTML = `
        <div class="record-item">
          <div class="record-top">
            <div class="record-date">공부기록</div>
            <div class="record-hours">${trimZero(study.totalHours)}시간</div>
          </div>
          ${subjectBadges(study.subjects)}
          <div class="record-note">${escapeHtml(study.note || '메모 없음')}</div>
        </div>
      `;
    }

    function aggregateSubjects(startDate, endDate) {
      const start = formatDate(startDate);
      const end = formatDate(endDate);
      const totals = emptySubjects();

      for (const [date, item] of Object.entries(state.data.studies)) {
        if (date < start || date > end) continue;
        const subjects = normalizeSubjects(item.subjects);
        for (const key of Object.keys(totals)) {
          totals[key] += Number(subjects[key] || 0);
        }
      }
      return totals;
    }

    function renderStatsList(targetEl, totals) {
      const max = Math.max(0, ...Object.values(totals));
      targetEl.innerHTML = Object.keys(SUBJECTS).map(key => {
        const value = Number(totals[key] || 0);
        const width = max > 0 ? (value / max) * 100 : 0;
        return `
          <div class="stats-row">
            <div class="stats-name">${SUBJECTS[key]}</div>
            <div class="bar-bg"><div class="bar-fill" style="width:${width}%"></div></div>
            <div class="stats-value">${trimZero(value)}h</div>
          </div>
        `;
      }).join('');
    }

    function renderStats() {
      const now = new Date();
      const week = getWeekRange(now);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0);

      renderStatsList(el.weeklyStats, aggregateSubjects(week.start, week.end));
      renderStatsList(el.monthlyStats, aggregateSubjects(monthStart, monthEnd));
    }

    function changeMonth(offset) {
      state.calendarMonth += offset;
      if (state.calendarMonth < 0) { state.calendarMonth = 11; state.calendarYear -= 1; }
      if (state.calendarMonth > 11) { state.calendarMonth = 0; state.calendarYear += 1; }
      renderCalendar();
    }

    function drawChart() {
      const canvas = el.studyChart;
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      ctx.clearRect(0, 0, w, h);

      const days = [];
      for (let i = 29; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = formatDate(d);
        days.push({
          label: `${d.getMonth() + 1}/${d.getDate()}`,
          value: Number((state.data.studies[key] || {}).totalHours || 0)
        });
      }

      const max = Math.max(8, ...days.map(d => d.value));
      const left = 36, right = 12, top = 18, bottom = 34;
      const chartW = w - left - right, chartH = h - top - bottom, barW = chartW / days.length - 6;

      ctx.strokeStyle = '#cbd5e1';
      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(left, h - bottom);
      ctx.lineTo(w - right, h - bottom);
      ctx.stroke();

      ctx.fillStyle = '#64748b';
      ctx.font = '12px sans-serif';
      for (let i = 0; i <= 4; i++) {
        const value = (max / 4) * i;
        const y = h - bottom - (chartH * i / 4);
        ctx.fillText(trimZero(value), 6, y + 4);
        ctx.strokeStyle = '#e5e7eb';
        ctx.beginPath();
        ctx.moveTo(left, y);
        ctx.lineTo(w - right, y);
        ctx.stroke();
      }

      days.forEach((d, idx) => {
        const x = left + idx * (barW + 6) + 3;
        const bh = d.value === 0 ? 2 : (d.value / max) * chartH;
        const y = h - bottom - bh;
        ctx.fillStyle = '#3b82f6';
        ctx.beginPath();
        roundRect(ctx, x, y, barW, bh, 6);
        ctx.fill();

        if (idx % 5 === 0 || idx === days.length - 1) {
          ctx.fillStyle = '#64748b';
          ctx.font = '11px sans-serif';
          ctx.save();
          ctx.translate(x + barW / 2, h - 10);
          ctx.rotate(-0.45);
          ctx.fillText(d.label, 0, 0);
          ctx.restore();
        }
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function calcStreak() {
      let streak = 0;
      const d = new Date();
      while (true) {
        const key = formatDate(d);
        const record = state.data.studies[key];
        if (record && Number(record.totalHours) > 0) {
          streak += 1;
          d.setDate(d.getDate() - 1);
        } else {
          break;
        }
      }
      return streak;
    }

    function getWeekRange(date) {
      const target = new Date(date);
      const day = target.getDay();
      const start = new Date(target);
      start.setHours(0, 0, 0, 0);
      start.setDate(target.getDate() - day);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      end.setHours(23, 59, 59, 999);
      return { start, end };
    }

    function sumRange(startDate, endDate) {
      const start = formatDate(startDate);
      const end = formatDate(endDate);
      return Object.entries(state.data.studies)
        .filter(([date]) => date >= start && date <= end)
        .reduce((sum, [, item]) => sum + Number(item.totalHours || 0), 0);
    }

    function trimZero(value) {
      const num = Number(value || 0);
      return Number.isInteger(num) ? String(num) : num.toFixed(1).replace(/\.0$/, '');
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function isValidDateKey(str) {
      return /^\d{4}-\d{2}-\d{2}$/.test(str);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./service-worker.js').catch(() => {});
      }
    }

    window.selectDate = function(date) {
      state.selectedDate = date;
      const selected = new Date(date);
      state.calendarYear = selected.getFullYear();
      state.calendarMonth = selected.getMonth();
      renderCalendar();
      renderSelectedDate();
    };

    window.editStudy = function(date) {
      const item = state.data.studies[date];
      if (!item) return;
      switchTab('input');
      el.studyDate.value = date;
      setSubjectInputs(item.subjects);
      el.studyNote.value = item.note || '';
      state.selectedDate = date;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.deleteStudy = function(date) {
      if (!confirm(`${date} 공부기록을 삭제할까요?`)) return;
      delete state.data.studies[date];
      saveData();
      renderAll();
    };
  </script>
</body>
</html>
